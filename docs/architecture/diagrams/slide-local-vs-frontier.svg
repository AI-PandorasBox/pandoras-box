<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif">
<defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="85%">
      <stop offset="0%" stop-color="#16182a"/>
      <stop offset="60%" stop-color="#0a0c18"/>
      <stop offset="100%" stop-color="#04050d"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="1" fill="#3a3a5a" fill-opacity="0.15"/>
    </pattern>
    <filter id="softshadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <linearGradient id="titleGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#7B68EE"/>
      <stop offset="100%" stop-color="#00B4FF"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7080a0"/>
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FFD700"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7BFF7B"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF6B6B"/>
    </marker>
    
    <linearGradient id="cg-msg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,180,255,0.14)"/>
      <stop offset="100%" stop-color="rgba(0,180,255,0.02)"/>
    </linearGradient>
    <linearGradient id="strip-msg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#00B4FF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#00B4FF" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="cg-router" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="rgba(123,104,238,0.14)"/>
      <stop offset="100%" stop-color="rgba(123,104,238,0.02)"/>
    </linearGradient>
    <linearGradient id="strip-router" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7B68EE" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7B68EE" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="cg-local" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="rgba(123,255,123,0.14)"/>
      <stop offset="100%" stop-color="rgba(123,255,123,0.02)"/>
    </linearGradient>
    <linearGradient id="strip-local" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7BFF7B" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7BFF7B" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="cg-frontier" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,215,0,0.14)"/>
      <stop offset="100%" stop-color="rgba(255,215,0,0.02)"/>
    </linearGradient>
    <linearGradient id="strip-frontier" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="cg-out" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,20,147,0.14)"/>
      <stop offset="100%" stop-color="rgba(255,20,147,0.02)"/>
    </linearGradient>
    <linearGradient id="strip-out" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FF1493" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FF1493" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
<rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)"/>
<g>
    <text x="800" y="80" text-anchor="middle" fill="url(#titleGrad)" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="42" font-weight="700" letter-spacing="7">LOCAL + FRONTIER</text>
    
    <line x1="486" y1="98" x2="616" y2="98" stroke="rgba(123,104,238,0.35)" stroke-width="1"/>
    <text x="800" y="104" text-anchor="middle" fill="#a0a0c0" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="13" font-weight="500" letter-spacing="5">RIGHT MODEL FOR THE JOB · COST-AWARE ROUTING</text>
    <line x1="984" y1="98" x2="1114" y2="98" stroke="rgba(123,104,238,0.35)" stroke-width="1"/>
  </g>
<g transform="translate(80, 280)" filter="url(#softshadow)">
  <rect x="0" y="0" width="280" height="120" rx="16" fill="rgba(26,26,46,0.55)" stroke="rgba(0,180,255,0.35)" stroke-width="1.5"/>
  <rect x="0" y="0" width="280" height="120" rx="16" fill="url(#cg-msg)"/>
  <rect x="0" y="0" width="6" height="120" rx="3" fill="url(#strip-msg)"/>
  <text x="28" y="48" fill="#f0f0ff" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="24" font-weight="600" letter-spacing="0.3">Incoming task</text>
  <text x="28" y="74" fill="#a0a0c0" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="13.5" font-weight="400" letter-spacing="0.4">message · classify · route</text>
</g>
<g transform="translate(460, 290)" filter="url(#softshadow)">
  <rect x="0" y="0" width="300" height="100" rx="16" fill="rgba(26,26,46,0.7)" stroke="rgba(123,104,238,0.7)" stroke-width="2"/>
  <rect x="0" y="0" width="300" height="100" rx="16" fill="url(#cg-router)"/>
  <rect x="0" y="0" width="6" height="100" rx="3" fill="url(#strip-router)"/>
  <g transform="translate(48, 38)">
    <circle cx="0" cy="0" r="24" fill="rgba(123,104,238,0.08)" stroke="rgba(123,104,238,0.7)" stroke-width="1.5"/>
    <text x="0" y="7" text-anchor="middle" fill="#7B68EE" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="15" font-weight="700" letter-spacing="1">R</text>
  </g>
  <text x="90" y="48" fill="#f0f0ff" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="24" font-weight="600" letter-spacing="0.3">Router</text>
  <text x="90" y="74" fill="#a0a0c0" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="13.5" font-weight="400" letter-spacing="0.4">pick model by task class</text>
</g>
<g transform="translate(880, 170)" filter="url(#softshadow)">
  <rect x="0" y="0" width="360" height="120" rx="16" fill="rgba(26,26,46,0.7)" stroke="rgba(123,255,123,0.7)" stroke-width="2"/>
  <rect x="0" y="0" width="360" height="120" rx="16" fill="url(#cg-local)"/>
  <rect x="0" y="0" width="6" height="120" rx="3" fill="url(#strip-local)"/>
  <text x="28" y="48" fill="#f0f0ff" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="24" font-weight="600" letter-spacing="0.3">Local model</text>
  <text x="28" y="74" fill="#a0a0c0" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="13.5" font-weight="400" letter-spacing="0.4">classify · summarise · extract</text>
  <g transform="translate(96, 78)">
    <rect x="0" y="0" width="64" height="28" rx="14" fill="rgba(123,255,123,0.06)" stroke="rgba(123,255,123,0.45)" stroke-width="1"/>
    <text x="32" y="18.5" text-anchor="middle" fill="#e8e8f8" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="13" font-weight="500" letter-spacing="0.3">free</text>
  </g>
  <g transform="translate(170, 78)">
    <rect x="0" y="0" width="64" height="28" rx="14" fill="rgba(123,255,123,0.06)" stroke="rgba(123,255,123,0.45)" stroke-width="1"/>
    <text x="32" y="18.5" text-anchor="middle" fill="#e8e8f8" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="13" font-weight="500" letter-spacing="0.3">fast</text>
  </g>
  <g transform="translate(244, 78)">
    <rect x="0" y="0" width="88" height="28" rx="14" fill="rgba(123,255,123,0.06)" stroke="rgba(123,255,123,0.45)" stroke-width="1"/>
    <text x="44" y="18.5" text-anchor="middle" fill="#e8e8f8" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="13" font-weight="500" letter-spacing="0.3">private</text>
  </g>
</g>
<g transform="translate(880, 430)" filter="url(#softshadow)">
  <rect x="0" y="0" width="360" height="120" rx="16" fill="rgba(26,26,46,0.7)" stroke="rgba(255,215,0,0.7)" stroke-width="2"/>
  <rect x="0" y="0" width="360" height="120" rx="16" fill="url(#cg-frontier)"/>
  <rect x="0" y="0" width="6" height="120" rx="3" fill="url(#strip-frontier)"/>
  <text x="28" y="48" fill="#f0f0ff" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="24" font-weight="600" letter-spacing="0.3">Frontier model</text>
  <text x="28" y="74" fill="#a0a0c0" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="13.5" font-weight="400" letter-spacing="0.4">reason · plan · write</text>
  <g transform="translate(194, 78)">
    <rect x="0" y="0" width="64" height="28" rx="14" fill="rgba(255,215,0,0.06)" stroke="rgba(255,215,0,0.45)" stroke-width="1"/>
    <text x="32" y="18.5" text-anchor="middle" fill="#e8e8f8" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="13" font-weight="500" letter-spacing="0.3">paid</text>
  </g>
  <g transform="translate(268, 78)">
    <rect x="0" y="0" width="64" height="28" rx="14" fill="rgba(255,215,0,0.06)" stroke="rgba(255,215,0,0.45)" stroke-width="1"/>
    <text x="32" y="18.5" text-anchor="middle" fill="#e8e8f8" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="13" font-weight="500" letter-spacing="0.3">deep</text>
  </g>
</g>
<g transform="translate(1340, 290)" filter="url(#softshadow)">
  <rect x="0" y="0" width="200" height="100" rx="16" fill="rgba(26,26,46,0.55)" stroke="rgba(255,20,147,0.35)" stroke-width="1.5"/>
  <rect x="0" y="0" width="200" height="100" rx="16" fill="url(#cg-out)"/>
  <rect x="0" y="0" width="6" height="100" rx="3" fill="url(#strip-out)"/>
  <text x="28" y="48" fill="#f0f0ff" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="24" font-weight="600" letter-spacing="0.3">Action</text>
</g>
<line x1="360" y1="340" x2="460" y2="340" stroke="#7080a0" stroke-width="2" stroke-opacity="0.8"  marker-end="url(#arrow)"/>
<line x1="760" y1="320" x2="880" y2="220" stroke="#7080a0" stroke-width="2" stroke-opacity="0.8"  marker-end="url(#arrow)"/>
<rect x="749" y="258" width="142" height="22" rx="11" fill="#0a0a14" stroke="#7080a0" stroke-width="1" stroke-opacity="0.4"/>
<text x="820" y="274" text-anchor="middle" fill="#a0a0c0" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="12.5" font-weight="500" font-style="italic" letter-spacing="0.3">high-frequency</text>
<line x1="760" y1="360" x2="880" y2="490" stroke="#7080a0" stroke-width="2" stroke-opacity="0.8"  marker-end="url(#arrow)"/>
<rect x="753.5" y="413" width="133" height="22" rx="11" fill="#0a0a14" stroke="#7080a0" stroke-width="1" stroke-opacity="0.4"/>
<text x="820" y="429" text-anchor="middle" fill="#a0a0c0" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="12.5" font-weight="500" font-style="italic" letter-spacing="0.3">low-frequency</text>
<line x1="1240" y1="230" x2="1340" y2="320" stroke="#7080a0" stroke-width="2" stroke-opacity="0.8"  marker-end="url(#arrow-green)"/>
<line x1="1240" y1="490" x2="1340" y2="360" stroke="#7080a0" stroke-width="2" stroke-opacity="0.8"  marker-end="url(#arrow-gold)"/>
<text x="800" y="820" text-anchor="middle" fill="#a0a0c0" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="16" font-weight="500" letter-spacing="0.5">The principle: use local models for high-frequency, low-complexity tasks.</text>
<text x="800" y="850" text-anchor="middle" fill="#a0a0c0" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif" font-size="16" font-weight="500" letter-spacing="0.5">Reserve frontier models for reasoning depth.</text>
</svg>
