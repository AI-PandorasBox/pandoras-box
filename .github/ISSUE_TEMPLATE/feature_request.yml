name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are welcome. Please describe the use case clearly -- requests framed around a real problem are much easier to evaluate than abstract capability requests.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do that the system does not currently support?
      placeholder: When I try to... I cannot...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would the ideal solution look like?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New module
        - Core / architecture
        - Installer
        - Personal AI
        - Company Agents
        - Admin interfaces
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you considered?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: This request does not require modifying Argus blocking behaviour
          required: true
